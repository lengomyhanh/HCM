<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Danh mục chỉ tiêu - Danh sách</title>
  
  <!-- Typography & Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Be+Vietnam+Pro:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ==========================================
       Hạnh — Design System & Custom Resets
       ========================================== */
    :root {
      /* ---- Ngọc / Jade (primary) ---- */
      --jade-50:  #ECF6F1;
      --jade-100: #D2EBE0;
      --jade-200: #A6D7C2;
      --jade-300: #72BCA0;
      --jade-400: #439C7E;
      --jade-500: #1F7A5E; /* brand primary */
      --jade-600: #156249;
      --jade-700: #114E3B;
      --jade-800: #0E3D2F;
      --jade-900: #0B2F25;

      /* ---- Hạnh / Apricot (accent) ---- */
      --apricot-50:  #FDF3E9;
      --apricot-100: #FAE3CB;
      --apricot-200: #F4C593;
      --apricot-300: #EDA85F;
      --apricot-400: #E58A36; /* brand accent */
      --apricot-500: #D5731E;
      --apricot-600: #B25A14;

      /* ---- Mực / Ink (warm neutrals) ---- */
      --paper:    #FBF9F5; /* page background, warm off-white */
      --paper-2:  #F4F0E8; /* sunken / alt sections */
      --white:    #FFFFFF;
      --ink-100:  #F2ECE1;
      --ink-200:  #E8E0D3;
      --ink-300:  #D6CCBD;
      --ink-400:  #B3A899;
      --ink-500:  #8C8175;
      --ink-600:  #6B6157;
      --ink-700:  #463F37;
      --ink-800:  #2E2924;
      --ink-900:  #1A1714;

      /* ---- Semantic (functional) ---- */
      --success-bg:  #E7F3EC;
      --success:     #1F8A5B;
      --success-fg:  #0E5236;
      --warning-bg:  #FBF0D6;
      --warning:     #C98A05;
      --warning-fg:  #7A540A;
      --error-bg:    #FBE7E4;
      --error:       #C8453B;
      --error-fg:    #862B25;
      --info-bg:     #E4EFF3;
      --info:        #2A6F86;
      --info-fg:     #194653;

      /* ---- Semantic aliases ---- */
      --brand-primary:        var(--jade-500);
      --brand-primary-hover:  var(--jade-600);
      --brand-primary-soft:   var(--jade-50);
      --brand-on-primary:     #FFFFFF;
      --brand-accent:         var(--apricot-400);

      --text-strong:   var(--ink-900);
      --text-body:     var(--ink-700);
      --text-muted:    var(--ink-500);
      --text-subtle:   var(--ink-400);
      --text-link:     var(--jade-600);

      --surface-page:   var(--paper);
      --surface-sunken: var(--paper-2);
      --surface-card:   var(--white);
      --surface-inset:  var(--ink-100);

      --border-subtle: var(--ink-200);
      --border-default:var(--ink-300);
      --border-strong: var(--ink-400);
      --border-focus:  var(--jade-500);

      /* ---- Corner radii ---- */
      --radius-xs:   4px;
      --radius-sm:   6px;
      --radius-md:   10px;
      --radius-lg:   14px;
      --radius-xl:   20px;
      --radius-2xl:  28px;
      --radius-full: 999px;

      /* ---- Shadows ---- */
      --shadow-xs:  0 1px 2px rgba(46, 41, 36, 0.06);
      --shadow-sm:  0 1px 3px rgba(46, 41, 36, 0.08), 0 1px 2px rgba(46, 41, 36, 0.04);
      --shadow-md:  0 4px 12px rgba(46, 41, 36, 0.08), 0 2px 4px rgba(46, 41, 36, 0.05);
      --shadow-lg:  0 12px 28px rgba(46, 41, 36, 0.12), 0 4px 8px rgba(46, 41, 36, 0.06);
      --shadow-xl:  0 24px 48px rgba(46, 41, 36, 0.16), 0 8px 16px rgba(46, 41, 36, 0.08);

      /* ---- Families ---- */
      --font-display: 'Lora', Georgia, serif;
      --font-sans:    'Be Vietnam Pro', system-ui, -apple-system, sans-serif;
      --font-mono:    'JetBrains Mono', monospace;
    }

    * {
      box-sizing: border-box;
      outline: none;
    }

    body {
      margin: 0;
      padding: 0;
      background: #EDE9E1;
      font-family: var(--font-sans);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* iOS Device Mockup */
    .ios-wrapper {
      background: #EDE9E1;
      padding: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .ios-device {
      width: 402px;
      height: 874px;
      border: 12px solid #2E2924;
      border-radius: 44px;
      background: var(--surface-page);
      box-shadow: var(--shadow-xl), 0 0 0 4px rgba(46, 41, 36, 0.2);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* Notch Simulation */
    .ios-device::before {
      content: '';
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 140px;
      height: 28px;
      background: #2E2924;
      border-bottom-left-radius: 18px;
      border-bottom-right-radius: 18px;
      z-index: 10;
    }

    /* Home Indicator Bar */
    .ios-device::after {
      content: '';
      position: absolute;
      bottom: 8px;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 4.5px;
      background: #2E2924;
      border-radius: 99px;
      z-index: 10;
      opacity: 0.8;
      pointer-events: none;
    }

    /* Screen contents scrollable */
    .ind-screen {
      height: 100%;
      overflow-y: auto;
      background: var(--surface-page);
      scrollbar-width: none; /* Firefox */
      -ms-overflow-style: none;  /* IE and Edge */
      display: flex;
      flex-direction: column;
    }

    .ind-screen::-webkit-scrollbar {
      display: none; /* Chrome, Safari and Opera */
    }

    /* Sticky Header */
    .sticky-header {
      position: sticky;
      top: 0;
      z-index: 8;
      padding: 54px 20px 14px;
      background: color-mix(in srgb, var(--paper) 90%, transparent);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border-subtle);
    }

    /* Grid & List Styles */
    .grid-container {
      padding: 16px 20px 36px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .list-container {
      padding: 16px 20px 36px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Interactive Cards */
    .card-item {
      display: flex;
      box-sizing: border-box;
      background: var(--surface-card);
      border: 1px solid var(--border-subtle);
      border-radius: 14px;
      box-shadow: var(--shadow-xs);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: box-shadow .18s, border-color .18s, transform .12s, opacity .18s, filter .18s;
    }

    /* Grid variant card */
    .card-item.is-grid-layout {
      flex-direction: column;
      align-items: flex-start;
      gap: 12px;
      padding: 15px 14px;
      min-height: 116px;
    }

    /* List variant card */
    .card-item.is-list-layout {
      flex-direction: row;
      align-items: center;
      gap: 14px;
      padding: 12px 14px;
    }

    .card-item:active {
      transform: scale(0.97);
    }

    .card-item.is-list-layout:active {
      transform: scale(0.99);
    }

    .card-chip {
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex: none;
    }

    .card-item.is-grid-layout .card-chip {
      width: 42px;
      height: 42px;
    }

    .card-item.is-list-layout .card-chip {
      width: 40px;
      height: 40px;
    }

    .card-label {
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      line-height: 1.34;
      letter-spacing: -0.01em;
      text-align: left;
    }

    .card-item.is-grid-layout .card-label {
      text-wrap: balance;
    }

    .card-item.is-list-layout .card-label {
      flex: 1;
    }

    /* Search state styles */
    @keyframes highlightPulse {
      0% { transform: scale(1); }
      50% { transform: scale(1.008); }
      100% { transform: scale(1); }
    }
    .card-item.is-matched {
      border: 1.5px solid var(--jade-500) !important;
      box-shadow: 0 4px 12px rgba(31,122,94,0.12), 0 0 0 3px rgba(31,122,94,0.15) !important;
      background: #F4FAF7 !important;
      animation: highlightPulse 2s infinite ease-in-out;
    }
    
    .card-item.is-matched .card-label {
      color: var(--jade-800) !important;
      font-weight: 600 !important;
    }

    .card-item.is-dimmed {
      opacity: 0.34 !important;
      filter: grayscale(0.25) !important;
    }

    /* Buttons */
    .btn-toggle {
      flex: none;
      width: 46px;
      height: 46px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--surface-card);
      border: 1.5px solid var(--border-subtle);
      border-radius: 13px;
      color: var(--ink-600);
      cursor: pointer;
      box-shadow: var(--shadow-xs);
      transition: transform 0.1s;
    }

    .btn-toggle:active {
      transform: scale(0.95);
    }

    .btn-clear {
      flex: none;
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      border-radius: 999px;
      background: var(--surface-inset);
      color: var(--ink-600);
      cursor: pointer;
      padding: 0;
    }

    /* Responsive Mode: Fullscreen on mobile */
    @media (max-width: 480px) {
      body {
        background: var(--surface-page);
      }
      .ios-wrapper {
        padding: 0;
        width: 100vw;
        height: 100vh;
      }
      .ios-device {
        width: 100vw;
        height: 100vh;
        border: none;
        border-radius: 0;
        box-shadow: none;
      }
      .ios-device::before {
        display: none; /* Hide notch on real mobile screen */
      }
      .sticky-header {
        padding-top: 24px; /* Lower padding on actual screen top */
      }
    }
  </style>
</head>

        <!-- Indicators Container -->

      return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="display: block;">${pathStr}</svg>`;
    }

    function highlightText(text, query) {
      if (!query) return text;
      const normalizedText = norm(text);
      const normalizedQuery = norm(query);
      const index = normalizedText.indexOf(normalizedQuery);
      if (index === -1) return text;
      
      const originalMatch = text.substr(index, query.length);
      const before = text.substr(0, index);
      const after = text.substr(index + query.length);
      return `${before}<mark style="background: var(--apricot-100); color: var(--apricot-600); padding: 0 2px; border-radius: 4px; font-weight: 600;">${originalMatch}</mark>${after}`;
    }

    // ==========================================
    // CORE RENDERING LOGIC
    // ==========================================
    const container = document.getElementById('indicators-container');
    const toggleIcon = document.getElementById('toggle-icon');
    const resultTextEl = document.getElementById('result-text');
    const searchInput = document.getElementById('search-input');
    const searchClear = document.getElementById('search-clear');
    const viewToggleBtn = document.getElementById('view-toggle');

    function updateViewModeUI() {
      // Toggle button shows the icon of the view to switch to, or list/grid icon.
      // If currentView is grid, we display list icon (meaning "click to switch to list")
      // If currentView is list, we display grid icon (meaning "click to switch to grid")
      toggleIcon.innerHTML = ICONS[currentView === 'grid' ? 'list' : 'grid'];
      
      if (currentView === 'grid') {
        container.className = 'grid-container';
      } else {
        container.className = 'list-container';
      }
    }

    function renderIndicators() {
      const q = searchQuery.trim();
      const hasQuery = q.length > 0;
      const nq = norm(q);

      let matchesCount = 0;
      let html = '';

      DATA.forEach((item, index) => {
        const name = item.n;
        const cat = CATS[item.c];
        const match = !hasQuery || norm(name).includes(nq);
        
        if (!match) return; // Hide unmatched items entirely

        matchesCount++;

        const chipBg = cat.bg;
        const chipFg = cat.fg;

        // Determine styles based on search state
        let itemClass = `card-item ${currentView === 'grid' ? 'is-grid-layout' : 'is-list-layout'}`;
        if (hasQuery) {
          itemClass += ' is-matched';
        }

        // Color override style for matched text (Jade 700) or default (Ink 800)
        const labelStyle = hasQuery ? 'color: var(--jade-700);' : 'color: var(--ink-800);';

        // Add additional elements for list layout (arrow-right icon)
        let listArrowSvg = '';
        if (currentView === 'list') {
          listArrowSvg = `<svg width="9" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--ink-300)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex: none; margin-left: auto;"><path d="m9 18 6-6-6-6"></path></svg>`;
        }

        const displayName = hasQuery ? highlightText(name, q) : name;

        html += `
          <div class="${itemClass}" onclick="openDetail(${index})" role="button">
            <div class="card-chip" style="background: ${chipBg}; color: ${chipFg};">
              ${renderIcon(item.i, currentView === 'grid' ? 22 : 20)}
            </div>
            <div class="card-label" style="${labelStyle}">
              ${displayName}
            </div>
            ${listArrowSvg}
          </div>
        `;
      });

      container.innerHTML = html;

      // Update count text
      if (hasQuery) {
        resultTextEl.textContent = matchesCount > 0 ? `${matchesCount} kết quả phù hợp` : 'Không tìm thấy chỉ tiêu phù hợp';
      } else {
        resultTextEl.textContent = `${DATA.length} chỉ tiêu`;
      }
    }

    window.openDetail = function(index) {
      // Save settings to preserve search query or layout on back
      localStorage.setItem('danhMucViewMode', currentView);
      localStorage.setItem('danhMucSearchQuery', searchQuery);
      
      // Navigate to detail page
      window.location.href = `./Danh mục chỉ tiêu - Chi tiết.html?id=${index}`;
    };

    // ==========================================
    // INTERACTION & LISTENERS
    // ==========================================
    viewToggleBtn.addEventListener('click', () => {
      currentView = currentView === 'grid' ? 'list' : 'grid';
      localStorage.setItem('danhMucViewMode', currentView);
      updateViewModeUI();
      renderIndicators();
    });

    searchInput.addEventListener('input', (e) => {
      searchQuery = e.target.value;
      if (searchQuery.length > 0) {
        searchClear.style.display = 'flex';
      } else {
        searchClear.style.display = 'none';
      }
      renderIndicators();
    });

    searchClear.addEventListener('click', () => {
      searchInput.value = '';
      searchQuery = '';
      searchClear.style.display = 'none';
      renderIndicators();
      searchInput.focus();
    });

    // Initialize state from local storage (if returning from detail screen)
    const savedSearch = localStorage.getItem('danhMucSearchQuery') || '';
    if (savedSearch) {
      searchInput.value = savedSearch;
      searchQuery = savedSearch;
      searchClear.style.display = 'flex';
    }

    updateViewModeUI();
    renderIndicators();
  </script>
</body>
</html>
