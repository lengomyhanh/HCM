<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Danh mục chỉ tiêu – Kinh tế Xã hội Thành phố</title>
<meta name="description" content="Danh mục chỉ tiêu kinh tế – xã hội Thành phố. Xem số liệu, xu hướng và thành phần từng chỉ tiêu.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=DM+Serif+Display&family=JetBrains+Mono:wght@500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --font-sans:'Inter',system-ui,sans-serif;
  --font-display:'DM Serif Display',serif;
  --font-mono:'JetBrains Mono',monospace;
  --surface-page:#F7F4EF;
  --surface-card:#FFFFFF;
  --surface-inset:#F0EDE8;
  --paper:#FFFFFF;
  --border-subtle:#E8E3DA;
  --border-default:#D4CEC5;
  --text-strong:#1A1814;
  --text-body:#3D3830;
  --text-muted:#7A7265;
  --text-subtle:#9C9589;
  --text-link:#1F7A5E;
  --ink-300:#C5BFB6;
  --ink-400:#A8A099;
  --ink-500:#8A827B;
  --ink-600:#6B645D;
  --ink-800:#2E2A25;
  --jade-50:#ECF6F1;
  --jade-400:#3BA87D;
  --jade-500:#2A9470;
  --jade-600:#1F7A5E;
  --jade-700:#165C47;
  --apricot-50:#FDF3E9;
  --apricot-400:#E8A050;
  --apricot-600:#C56A1A;
  --info-bg:#EEF5FD;
  --info-fg:#1B5BA0;
  --shadow-xs:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-sm:0 2px 8px rgba(0,0,0,.07),0 1px 3px rgba(0,0,0,.05);
  --shadow-md:0 4px 16px rgba(0,0,0,.10),0 2px 6px rgba(0,0,0,.06);
}
html,body{height:100%;background:#EDE9E1;font-family:var(--font-sans);}
::-webkit-scrollbar{width:0;height:0}

/* ── Page layout ── */
.page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;}

/* ── Phone frame ── */
.phone{
  position:relative;width:402px;height:874px;flex:none;
  border-radius:54px;
  background:#1A1814;
  box-shadow:
    0 0 0 1px rgba(255,255,255,.12),
    0 32px 80px rgba(0,0,0,.45),
    0 8px 24px rgba(0,0,0,.30),
    inset 0 1px 0 rgba(255,255,255,.15);
}
.phone-inner{
  position:absolute;inset:10px;border-radius:46px;overflow:hidden;background:var(--surface-page);
  display:flex;flex-direction:column;
}
/* Dynamic island */
.phone::before{
  content:'';position:absolute;top:16px;left:50%;transform:translateX(-50%);
  width:120px;height:34px;border-radius:20px;background:#111;
  z-index:20;
  box-shadow:0 0 0 1px rgba(255,255,255,.08);
}
/* Side buttons */
.phone::after{
  content:'';position:absolute;left:-3px;top:120px;
  width:3px;height:36px;border-radius:2px 0 0 2px;background:#333;
  box-shadow:0 50px 0 #333, 0 96px 0 #333;
}

/* ── Screens ── */
.screen{position:absolute;inset:0;overflow-y:auto;background:var(--surface-page);display:none;}
.screen.active{display:block;}
.screen::-webkit-scrollbar{width:0}

/* ── Sticky header ── */
.sticky-header{
  position:sticky;top:0;z-index:8;
  padding:54px 20px 14px;
  background:rgba(255,255,255,.90);
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border-subtle);
}
.header-top{display:flex;align-items:center;gap:11px;padding-bottom:13px;}
.logo-icon{flex:none;width:28px;height:28px;}
.header-title-group{display:flex;flex-direction:column;gap:2px;min-width:0;}
.header-title{font-family:var(--font-display);font-size:22px;font-weight:600;color:var(--text-strong);letter-spacing:-.01em;line-height:1.15;white-space:nowrap;}
.header-sub{font-size:12px;color:var(--text-muted);white-space:nowrap;}

/* search bar */
.search-row{display:flex;gap:10px;align-items:center;}
.search-box{
  flex:1;display:flex;align-items:center;gap:9px;height:46px;padding:0 13px;
  background:var(--surface-card);border:1.5px solid var(--border-subtle);
  border-radius:13px;box-shadow:var(--shadow-xs);
}
.search-box input{
  flex:1;min-width:0;border:none;outline:none;background:transparent;
  font-family:var(--font-sans);font-size:15px;color:var(--text-strong);
}
.search-box input::placeholder{color:var(--ink-400);}
.btn-clear{
  flex:none;width:22px;height:22px;display:none;align-items:center;justify-content:center;
  border:none;border-radius:999px;background:var(--surface-inset);
  color:var(--ink-600);cursor:pointer;padding:0;
}
.btn-clear.visible{display:flex;}
.btn-toggle{
  flex:none;width:46px;height:46px;display:flex;align-items:center;justify-content:center;
  background:var(--surface-card);border:1.5px solid var(--border-subtle);border-radius:13px;
  color:var(--ink-600);cursor:pointer;box-shadow:var(--shadow-xs);
  transition:transform .12s;
}
.btn-toggle:active{transform:scale(.94);}

/* result line */
.result-line{display:flex;align-items:center;justify-content:space-between;gap:10px;padding-top:13px;}
.result-count{font-size:13px;font-weight:500;color:var(--text-body);white-space:nowrap;}
.result-hint{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--text-subtle);white-space:nowrap;flex:none;}

/* ── GRID ── */
#grid-view{padding:16px 20px 36px;display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.card-grid{
  display:flex;flex-direction:column;align-items:flex-start;gap:12px;
  padding:15px 14px;background:var(--surface-card);border:1px solid var(--border-subtle);
  border-radius:14px;box-shadow:var(--shadow-xs);cursor:pointer;min-height:116px;
  transition:box-shadow .18s,border-color .18s,transform .12s,opacity .18s,filter .18s;
  -webkit-tap-highlight-color:transparent;
}
.card-grid:active{transform:scale(.97);}
.card-grid.matched{border:1.5px solid var(--jade-400);box-shadow:0 0 0 3px rgba(31,122,94,.10),var(--shadow-md);background:#FCFDFB;}
.card-grid.dimmed{opacity:.34;filter:grayscale(.25);}
.card-grid .card-label{font-family:var(--font-sans);font-size:14px;font-weight:500;line-height:1.34;color:var(--ink-800);letter-spacing:-.01em;text-wrap:balance;}
.card-grid.matched .card-label{color:var(--jade-700);}

/* ── LIST ── */
#list-view{padding:16px 20px 36px;display:flex;flex-direction:column;gap:10px;}
.card-list{
  display:flex;flex-direction:row;align-items:center;gap:14px;
  padding:12px 14px;background:var(--surface-card);border:1px solid var(--border-subtle);
  border-radius:14px;box-shadow:var(--shadow-xs);cursor:pointer;
  transition:box-shadow .18s,border-color .18s,transform .12s,opacity .18s,filter .18s;
  -webkit-tap-highlight-color:transparent;
}
.card-list:active{transform:scale(.99);}
.card-list.matched{border:1.5px solid var(--jade-400);box-shadow:0 0 0 3px rgba(31,122,94,.10),var(--shadow-md);background:#FCFDFB;}
.card-list.dimmed{opacity:.34;filter:grayscale(.25);}
.card-list .card-label{flex:1;font-family:var(--font-sans);font-size:14px;font-weight:500;line-height:1.34;color:var(--ink-800);letter-spacing:-.01em;}
.card-list.matched .card-label{color:var(--jade-700);}

/* chip */
.chip{
  display:flex;align-items:center;justify-content:center;flex:none;
  border-radius:12px;
}
.chip svg{display:block;}

/* ── DETAIL ── */
#detail-screen .back-bar{
  position:sticky;top:0;z-index:8;padding:54px 14px 10px;
  background:rgba(255,255,255,.90);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.btn-back{
  display:flex;align-items:center;gap:4px;padding:6px 8px;border:none;background:transparent;
  color:var(--text-link);cursor:pointer;font-family:var(--font-sans);font-size:16px;font-weight:500;
  transition:opacity .15s;
}
.btn-back:active{opacity:.6;}

.detail-hero{padding:6px 22px 0;display:flex;flex-direction:column;gap:14px;}
.hero-chip{width:60px;height:60px;border-radius:17px;display:flex;align-items:center;justify-content:center;flex:none;}
.hero-eyebrow{font-size:11px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--text-muted);}
.hero-name{font-family:var(--font-display);font-size:27px;font-weight:600;line-height:1.18;letter-spacing:-.01em;color:var(--text-strong);text-wrap:balance;}
.demo-badge{display:inline-flex;align-items:center;gap:7px;padding:5px 11px;border-radius:999px;background:var(--apricot-50);color:var(--apricot-600);font-size:11.5px;font-weight:500;width:fit-content;}
.demo-dot{width:6px;height:6px;border-radius:999px;background:var(--apricot-400);}

.metric-card{
  background:var(--surface-card);border:1px solid var(--border-subtle);
  border-radius:16px;box-shadow:var(--shadow-sm);padding:18px;
}
.metric-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;}
.metric-cadence{font-size:12px;color:var(--text-muted);white-space:nowrap;}
.metric-value-row{display:flex;align-items:baseline;gap:6px;flex-wrap:wrap;}
.metric-value{font-family:var(--font-display);font-size:36px;font-weight:600;color:var(--text-strong);line-height:1;letter-spacing:-.01em;}
.metric-unit{font-size:14px;color:var(--text-muted);white-space:nowrap;}
.metric-compare-note{margin-top:12px;font-size:12.5px;color:var(--text-subtle);}

.delta-badge{display:inline-flex;align-items:center;gap:4px;padding:5px 10px;border-radius:999px;font-size:12.5px;font-weight:600;}
.delta-badge.up{background:var(--jade-50);color:var(--jade-600);}
.delta-badge.down{background:var(--surface-inset);color:var(--ink-600);}

.detail-section{
  background:var(--surface-card);border:1px solid var(--border-subtle);
  border-radius:16px;box-shadow:var(--shadow-sm);overflow:hidden;
}
.detail-section-title{padding:14px 16px 6px;font-size:14px;font-weight:600;color:var(--text-strong);}
.detail-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:12px 16px;border-top:1px solid var(--border-subtle);}
.detail-row-label{font-size:13.5px;color:var(--text-body);}
.detail-row-val{font-family:var(--font-mono);font-size:13.5px;font-weight:600;white-space:nowrap;color:var(--text-strong);}
.detail-row-delta{display:inline-flex;align-items:center;gap:5px;font-family:var(--font-mono);font-size:13.5px;font-weight:600;}

.empty-fields-card{
  background:var(--surface-card);border:1px dashed var(--border-default);
  border-radius:16px;padding:18px 16px;text-align:center;font-size:13px;color:var(--text-muted);
}
.note-card{display:flex;align-items:flex-start;gap:9px;padding:12px 14px;border-radius:13px;background:var(--info-bg);color:var(--info-fg);}
.note-text{font-size:13px;line-height:1.4;}

.history-row{display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-top:1px solid var(--border-subtle);}
.history-label{font-size:14px;color:var(--text-body);white-space:nowrap;}
.history-val{font-family:var(--font-mono);font-size:14px;font-weight:600;color:var(--text-strong);}

.meta-row{display:flex;align-items:center;justify-content:space-between;gap:12px;padding:13px 16px;}
.meta-row+.meta-row{border-top:1px solid var(--border-subtle);}
.meta-key{font-size:13.5px;color:var(--text-muted);}
.meta-val{font-size:13.5px;font-weight:500;color:var(--text-body);text-align:right;max-width:64%;}

.pad-section{padding:14px 22px 0;}
.pad-section-last{padding:14px 22px 40px;}

/* chart */
.chart-wrap{background:var(--surface-card);border:1px solid var(--border-subtle);border-radius:16px;box-shadow:var(--shadow-sm);overflow:hidden;}
.chart-header{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:15px 16px 2px;}
.chart-title{font-size:14px;font-weight:600;color:var(--text-strong);white-space:nowrap;}
.chart-unit-lbl{font-size:12px;color:var(--text-subtle);white-space:nowrap;flex:none;}
.chart-body{padding:6px 12px 12px;}
</style>
</head>

          <div class="header-top">
            <!-- Logo -->
            <svg class="logo-icon" viewBox="0 0 100 100">
              <g fill="#1F7A5E">
                <ellipse cx="50" cy="27" rx="10.5" ry="21"/>

              <div class="header-title">Danh mục chỉ tiêu</div>
              <div class="header-sub">Kinh tế – xã hội Thành phố</div>
            </div>
          </div>

          <!-- search + toggle -->
          <div class="search-row">
            <div class="search-box">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="var(--ink-400)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
              <input id="search-input" type="text" placeholder="Nhập tên chỉ tiêu" autocomplete="off">
              <button class="btn-clear" id="btn-clear" aria-label="Xóa">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
              </button>
            </div>
            <button class="btn-toggle" id="btn-toggle" aria-label="Đổi cách hiển thị">
              <svg id="toggle-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"></svg>
            </button>
          </div>

          <!-- result -->
          <div class="result-line">
            <div class="result-count" id="result-count"></div>
            <div class="result-hint">
              <span>Chạm để xem</span>
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>
            </div>
          </div>
        </div>

        <!-- grid view -->
        <div id="grid-view"></div>
        <!-- list view -->
        <div id="list-view" style="display:none"></div>
      </div><!-- /list-screen -->

      <!-- ══ DETAIL SCREEN ══ -->
      <div class="screen" id="detail-screen">
        <div class="back-bar">
          <button class="btn-back" id="btn-back">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
            <span>Danh mục</span>
          </button>
        </div>
        <div id="detail-content"></div>
      </div>

    </div><!-- /phone-inner -->
  </div><!-- /phone -->

</div><!-- /page -->

  {n:'Kết quả các mô hình dân vận khéo',i:'handshake',c:'hc',s:'VI',d:'Ban Tuyên giáo và Dân vận Thành ủy',cad:'Hàng năm',f:['Số mô hình được nhân rộng'],note:'≥ 50 mô hình theo Chương trình hành động'}
];

// ─── UTILS ──────────────────────────────────────────────────────────
function norm(s){ return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').replace(/đ/g,'d').replace(/Đ/g,'D').toLowerCase(); }
function rnd(seed){ const x=Math.sin((seed+1)*99.137)*10000; return x-Math.floor(x); }
function fmtNum(v,unit){ if(unit==='%') return v.toFixed(1); return new Intl.NumberFormat('vi-VN').format(Math.round(v)); }

function inferUnit(name){
  const n=norm(name);
  if(/ty le|chi so|iip|cpi|grdp|tang truong/.test(n)) return '%';
  if(/dien tich/.test(n)) return 'nghìn m²';
  if(/so ca/.test(n)) return 'ca';
  if(/ho ngheo/.test(n)) return 'hộ';
  if(/so du an/.test(n)) return 'dự án';
  if(/dang vien|viec lam/.test(n)) return 'người';
  if(/to chuc|tc dang/.test(n)) return 'tổ chức';
  if(/nha o xa hoi|so luong/.test(n)) return 'căn';
  if(/von|ngan sach|du no|huy dong|giai ngan|ban le|doanh thu|thue/.test(n)) return 'tỷ đồng';
  if(/hanh khach|luong khach/.test(n)) return 'nghìn lượt';
  if(/hang hoa/.test(n)) return 'nghìn tấn';
  if(/chat thai/.test(n)) return 'tấn/ngày';
  return '';
}

function iconSVG(name, size, color){
  const paths = ICONS[name]||ICONS.dot;
  return `<svg width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="${color||'currentColor'}" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" style="display:block">${paths}</svg>`;
}

function fieldValue(name, seed){
  const n=norm(name), r=rnd(seed);
  if(/trang thai/.test(n)) return {val:'Chính thức (O)',kind:'tag'};
  if(/cong trinh|danh sach/.test(n)) return {val:'Xem danh sách',kind:'link'};
  if(/ty le/.test(n)) return {val:(58+r*40).toFixed(1)+'%'};
  if((/dien tich.*km|^dien tich$/.test(n))||(/\bdien tich\b/.test(n)&&/dat dai/.test(n))) return {val:fmtNum(820+r*1400,'')+' km²'};
  if(/dan so/.test(n)) return {val:fmtNum(6200000+r*3400000,'')+' người'};
  if(/mat do/.test(n)) return {val:fmtNum(3200+r*7200,'')+' ng/km²'};
  if(/dien tich/.test(n)) return {val:fmtNum(40+r*920,'')+' nghìn m²'};
  if(/von|gia tri|tri gia|ngan sach|thue|tiet kiem|gtgt|tndn|tncn|huy dong|du no|thiet hai/.test(n)) return {val:fmtNum(1800+r*86000,'')+' tỷ'};
  if(/lao dong/.test(n)) return {val:fmtNum(1200+r*42000,'')+' người'};
  if(/nguoi chet/.test(n)) return {val:fmtNum(1+r*38,'')+' người'};
  if(/bi thuong/.test(n)) return {val:fmtNum(6+r*120,'')+' người'};
  if(/ho so|pakn/.test(n)) return {val:fmtNum(400+r*46000,'')};
  if(/luong|usd/.test(n)) return {val:fmtNum(120+r*9400,'')};
  return {val:fmtNum(6+r*4800,'')};
}

function buildChartSVG(series, months, color){
  const W=322,H=132,pl=8,pr=8,pt=16,pb=24;
  const min=Math.min(...series), max=Math.max(...series);
  const span=(max-min)||1, n=series.length;
  const x=(i)=>pl+i*(W-pl-pr)/(n-1);
  const y=(v)=>pt+(1-(v-min)/span)*(H-pt-pb);
  const pts=series.map((v,i)=>[x(i),y(v)]);
  const line=pts.map((p,i)=>(i?'L':'M')+p[0].toFixed(1)+' '+p[1].toFixed(1)).join(' ');
  const area=line+' L '+x(n-1).toFixed(1)+' '+(H-pb).toFixed(1)+' L '+x(0).toFixed(1)+' '+(H-pb).toFixed(1)+' Z';
  const gid='cg'+Math.floor(rnd(series[0]+series[Math.min(5,n-1)])*1e6).toString(36);
  let inner='';
  inner+=`<defs><linearGradient id="${gid}" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="${color}" stop-opacity="0.20"/><stop offset="1" stop-color="${color}" stop-opacity="0"/></linearGradient></defs>`;
  inner+=`<line x1="${pl}" y1="${H-pb}" x2="${W-pr}" y2="${H-pb}" stroke="#E8E0D3" stroke-width="1"/>`;
  inner+=`<path d="${area}" fill="url(#${gid})"/>`;
  inner+=`<path d="${line}" fill="none" stroke="${color}" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>`;
  const last=pts[n-1];
  inner+=`<circle cx="${last[0].toFixed(1)}" cy="${last[1].toFixed(1)}" r="4.2" fill="#fff" stroke="${color}" stroke-width="2.4"/>`;
  months.forEach((m,i)=>{inner+=`<text x="${x(i).toFixed(1)}" y="${H-7}" text-anchor="middle" font-family="Inter,sans-serif" font-size="10.5" fill="#8C8175">${m}</text>`;});
  return `<svg viewBox="0 0 ${W} ${H}" width="100%" height="${H}" style="display:block;overflow:visible">${inner}</svg>`;
}

function buildDetail(id){
  const it=DATA[id];
  const cat=CATS[it.c];
  const sec=SECTIONS[it.s];
  const unit=inferUnit(it.n);

  const fields=(it.f||[]).map((nm,fi)=>{
    const fv=fieldValue(nm,id*131+fi+7);
    return {label:nm,val:fv.val,kind:fv.kind||''};
  });
  const hasFieldsKey=(it.f!=null);
  const emptyFields=hasFieldsKey&&fields.length===0;

  const cad=it.cad||'Hàng tháng';
  let labels,periodLabel,kterm,recentFn;
  if(cad==='Hàng quý'){labels=['Q3/25','Q4/25','Q1/26','Q2/26'];periodLabel='Quý II · 2026';kterm='quý trước';recentFn=(l)=>l;}
  else if(cad==='Hàng năm'){labels=['2022','2023','2024','2025'];periodLabel='Năm 2025';kterm='năm trước';recentFn=(l)=>'Năm '+l;}
  else{labels=['Th1','Th2','Th3','Th4','Th5','Th6'];periodLabel='Tháng 6 · 2026';kterm='tháng trước';recentFn=(l)=>l+' · 2026';}

  const base=80+rnd(id+3)*110;
  const series=labels.map((l,i)=>{const t=i-(labels.length-1);return Math.max(1,base*(1+t*0.03+(rnd(id*11+i)-0.5)*0.07));});
  const color=cat.fg;

  let value,vunit;
  if(fields.length){value=fields[0].val;vunit='';}
  else if(emptyFields){value='—';vunit='';}
  else{const ranges={'%':[62,96],'tỷ đồng':[3200,68000],'ca':[120,2600],'hộ':[480,5200],'dự án':[6,84],'người':[820,9400],'tổ chức':[180,420],'căn':[240,3800],'nghìn lượt':[140,2400],'nghìn tấn':[90,1800],'tấn/ngày':[2400,9800],'nghìn m²':[60,1400],'':[120,4800]};const rg=ranges[unit]||ranges[''];value=fmtNum(rg[0]+rnd(id+1)*(rg[1]-rg[0]),unit);vunit=unit;}

  const dp=(rnd(id*3+2)-0.34)*22, up=dp>=0;

  const compareRows=[`So với ${kterm}`,'So với cùng kỳ','Lũy kế so với cùng kỳ'].map((lb,k)=>{
    const d=(rnd(id*7+k*5+1)-0.36)*20, u2=d>=0;
    return{label:lb,delta:Math.abs(d).toFixed(1)+'%',up:u2};
  });

  const history=[];
  for(let i=series.length-1;i>=Math.max(1,series.length-4);i--){
    const u3=series[i]>=series[i-1];
    history.push({label:recentFn(labels[i]),val:fmtNum(series[i],''),up:u3});
  }

  const chartTitle=cad==='Hàng năm'?'Diễn biến 4 năm':(cad==='Hàng quý'?'Diễn biến 4 quý':'Diễn biến 6 tháng');

  return{
    name:it.n,icon:it.i,cat,sec,
    sectionEyebrow:it.s+' · '+sec,
    value,vunit,unit,unitLabel:unit||'Chỉ số',
    deltaText:Math.abs(dp).toFixed(1)+'%',up,
    cadenceNote:'Kỳ báo cáo · '+periodLabel,
    cadence:cad,
    hasCompare:!!it.cmp,compareRows,
    hasFields:hasFieldsKey&&fields.length>0,fields,emptyFields,
    chartSVG:buildChartSVG(series,labels,color),chartTitle,chartUnit:unit||'Chỉ số',
    history,
    dept:it.d,sectionFull:it.s+' · '+sec,
    noteText:it.note||'',hasNote:!!it.note
  };
}

// ─── STATE ──────────────────────────────────────────────────────────
let state={query:'',view:'grid',selectedId:null};

// ─── RENDER LIST ────────────────────────────────────────────────────
function renderList(){
  const q=state.query.trim();
  const hasQ=q.length>0;
  const nq=norm(q);
  const isList=state.view==='list';

  const gridEl=document.getElementById('grid-view');
  const listEl=document.getElementById('list-view');
  gridEl.style.display=isList?'none':'grid';
  listEl.style.display=isList?'flex':'none';

  // toggle icon
  document.getElementById('toggle-icon').innerHTML=ICONS[isList?'grid':'list'];

  // result count
  let matched=0;
  DATA.forEach(row=>{if(!hasQ||norm(row.n).includes(nq))matched++;});
  const countEl=document.getElementById('result-count');
  if(hasQ) countEl.textContent=matched>0?(matched+' kết quả phù hợp'):'Không tìm thấy chỉ tiêu phù hợp';
  else countEl.textContent=DATA.length+' chỉ tiêu';

  // clear btn
  document.getElementById('btn-clear').classList.toggle('visible',hasQ);

  // build cards
  const target=isList?listEl:gridEl;
  target.innerHTML='';
  DATA.forEach((row,i)=>{
    const cat=CATS[row.c];
    const match=!hasQ||norm(row.n).includes(nq);
    const cls=isList?'card-list':'card-grid';
    let extraCls='';
    if(hasQ&&match) extraCls=' matched';
    else if(hasQ&&!match) extraCls=' dimmed';

    const chipSz=isList?40:42;
    const chip=`<div class="chip" style="width:${chipSz}px;height:${chipSz}px;background:${cat.bg};color:${cat.fg};">${iconSVG(row.i,22,cat.fg)}</div>`;
    const label=`<div class="card-label">${row.n}</div>`;
    const arrow=isList?`<svg width="9" height="15" viewBox="0 0 24 24" fill="none" stroke="var(--ink-300)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="flex:none"><path d="m9 18 6-6-6-6"/></svg>`:'';

    const card=document.createElement('div');
    card.className=cls+extraCls;
    card.setAttribute('role','button');
    card.setAttribute('tabindex','0');
    card.innerHTML=chip+label+arrow;
    card.addEventListener('click',()=>openDetail(i));
    card.addEventListener('keydown',e=>{if(e.key==='Enter'||e.key===' ')openDetail(i);});
    target.appendChild(card);
  });
}

// ─── DETAIL ─────────────────────────────────────────────────────────
function openDetail(id){
  state.selectedId=id;
  const d=buildDetail(id);
  const cat=d.cat;

  let html='';

  // hero
  html+=`<div class="detail-hero">
    <div class="hero-chip" style="background:${cat.bg};color:${cat.fg};">${iconSVG(d.icon,28,cat.fg)}</div>
    <div>
      <div class="hero-eyebrow">${d.sectionEyebrow}</div>
      <div class="hero-name">${d.name}</div>
    </div>
    <div class="demo-badge"><span class="demo-dot"></span>Dữ liệu minh hoạ — thay bằng số liệu thật</div>
  </div>`;

  // primary metric
  const arrowIcon=iconSVG(d.up?'trending-up':'trending-down',13,d.up?'var(--jade-600)':'var(--ink-600)');
  html+=`<div class="pad-section">
    <div class="metric-card">
      <div class="metric-row">
        <div>
          <div class="metric-cadence">${d.cadenceNote}</div>
          <div class="metric-value-row">
            <span class="metric-value">${d.value}</span>
            <span class="metric-unit">${d.vunit}</span>
          </div>
        </div>
        <div class="delta-badge ${d.up?'up':'down'}">${arrowIcon}<span>${d.deltaText}</span></div>
      </div>
      <div class="metric-compare-note">So với cùng kỳ năm trước</div>
    </div>
  </div>`;

  // chart
  html+=`<div class="pad-section">
    <div class="chart-wrap">
      <div class="chart-header">
        <span class="chart-title">${d.chartTitle}</span>
        <span class="chart-unit-lbl">${d.chartUnit}</span>
      </div>
      <div class="chart-body">${d.chartSVG}</div>
    </div>
  </div>`;

  // comparison
  if(d.hasCompare){
    let rows='';
    d.compareRows.forEach(r=>{
      const ico=iconSVG(r.up?'trending-up':'trending-down',13,r.up?'var(--jade-600)':'var(--ink-500)');
      rows+=`<div class="detail-row"><span class="detail-row-label">${r.label}</span><span class="detail-row-delta" style="color:${r.up?'var(--jade-600)':'var(--ink-500)'}">${ico}<span>${r.delta}</span></span></div>`;
    });
    html+=`<div class="pad-section"><div class="detail-section"><div class="detail-section-title">So sánh kỳ báo cáo</div>${rows}</div></div>`;
  }

  // component fields
  if(d.hasFields){
    let rows='';
    d.fields.forEach(f=>{
      let valStyle='font-family:var(--font-mono);font-size:13.5px;font-weight:600;white-space:nowrap;color:var(--text-strong);';
      if(f.kind==='link') valStyle='font-size:13.5px;font-weight:500;color:var(--jade-600);';
      else if(f.kind==='tag') valStyle='font-size:13.5px;font-weight:500;color:var(--apricot-600);';
      rows+=`<div class="detail-row" style="align-items:flex-start;"><span style="flex:1;font-size:13.5px;color:var(--text-body);line-height:1.35;">${f.label}</span><span style="${valStyle}">${f.val}</span></div>`;
    });
    html+=`<div class="pad-section"><div class="detail-section"><div class="detail-section-title">Số liệu thành phần</div>${rows}</div></div>`;
  }

  // empty fields
  if(d.emptyFields){
    html+=`<div class="pad-section"><div class="empty-fields-card">Đang cập nhật các thông số giám sát.</div></div>`;
  }

  // note
  if(d.hasNote){
    const infoIcon=iconSVG('dot',16,'var(--info-fg)');
    html+=`<div class="pad-section"><div class="note-card"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="var(--info-fg)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="flex:none;margin-top:1px"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg><span class="note-text">${d.noteText}</span></div></div>`;
  }

  // recent periods
  html+=`<div class="pad-section"><div class="detail-section"><div class="detail-section-title">Số liệu gần đây</div>`;
  d.history.forEach(h=>{
    const ico=iconSVG(h.up?'trending-up':'trending-down',13,h.up?'var(--jade-500)':'var(--ink-400)');
    html+=`<div class="history-row"><span class="history-label">${h.label}</span><span style="display:flex;align-items:center;gap:8px;"><span class="history-val">${h.val}</span><span style="display:flex;color:${h.up?'var(--jade-500)':'var(--ink-400)'};">${ico}</span></span></div>`;
  });
  html+=`</div></div>`;

  // meta
  html+=`<div class="pad-section-last"><div class="detail-section">
    <div class="meta-row"><span class="meta-key">Đơn vị chủ trì</span><span class="meta-val">${d.dept}</span></div>
    <div class="meta-row"><span class="meta-key">Kỳ báo cáo</span><span class="meta-val">${d.cadence}</span></div>
    <div class="meta-row"><span class="meta-key">Phân nhóm</span><span class="meta-val">${d.sectionFull}</span></div>
    <div class="meta-row"><span class="meta-key">Đơn vị tính</span><span class="meta-val">${d.unitLabel}</span></div>
  </div></div>`;

  document.getElementById('detail-content').innerHTML=html;
  document.getElementById('list-screen').classList.remove('active');
  document.getElementById('detail-screen').classList.add('active');
  document.getElementById('detail-screen').scrollTop=0;
}

function closeDetail(){
  state.selectedId=null;
  document.getElementById('detail-screen').classList.remove('active');
  document.getElementById('list-screen').classList.add('active');
}

// ─── INIT ────────────────────────────────────────────────────────────
document.getElementById('search-input').addEventListener('input',e=>{
  state.query=e.target.value;
  renderList();
});
document.getElementById('btn-clear').addEventListener('click',()=>{
  state.query='';
  document.getElementById('search-input').value='';
  renderList();
});
document.getElementById('btn-toggle').addEventListener('click',()=>{
  state.view=state.view==='grid'?'list':'grid';
  renderList();
});
document.getElementById('btn-back').addEventListener('click',closeDetail);

renderList();
</script>
</body>
</html>
